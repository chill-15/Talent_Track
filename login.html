<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Login – TalentTrack</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
</head>
<body>
<div id="toast-container"></div>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-brand">TalentTrack</a>
    <div class="nav-links">
      <button class="theme-btn" onclick="toggleTheme()">🌙</button>
      <a href="register.html" class="nav-btn outline">Register</a>
      <a href="admin.html"    class="nav-btn primary">Admin</a>
    </div>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo"><span class="brand-logo">TalentTrack</span></div>
    <h2>Welcome Back</h2>
    <p class="auth-sub">Sign in to your account</p>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="login-email" placeholder="you@example.com"
             onkeydown="if(event.key==='Enter') doLogin()"/>
      <div class="form-error" id="err-email"></div>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-pass" placeholder="Your password"
             onkeydown="if(event.key==='Enter') doLogin()"/>
      <div class="form-error" id="err-pass"></div>
    </div>
    <div class="form-error" id="err-general"></div>

    <button class="auth-submit" id="login-btn" onclick="doLogin()">
      <span id="login-btn-text">Sign In</span>
      <span id="login-spinner" class="spinner" style="display:none"></span>
    </button>

    <div class="auth-link">
      Don't have an account? <a href="register.html">Register</a> ·
      <a href="index.html">Home</a>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script>
  if (localStorage.getItem("tt_token") && localStorage.getItem("tt_role")==="user") {
    window.location.href="dashboard.html";
  }

  async function doLogin() {
    clearErrors();
    const email = document.getElementById("login-email").value.trim();
    const pass  = document.getElementById("login-pass").value;

    if (!email) { showErr("err-email","Email is required"); return; }
    if (!pass)  { showErr("err-pass","Password is required"); return; }

    setLoading("login-btn","login-btn-text","login-spinner",true);
    try {
      const res = await apiPost("/api/users/login",{ email, password:pass });
      if (res.success) {
        saveAuth(res.token, res.user);
        toast(`Welcome back, ${res.user.name}! 👋`,"success");
        setTimeout(()=>{ window.location.href="dashboard.html"; },900);
      } else {
        showErr("err-general", res.message || "Invalid email or password");
      }
    } catch(err) {
      showErr("err-general","Cannot connect to server. Make sure backend is running.");
    } finally {
      setLoading("login-btn","login-btn-text","login-spinner",false,"Sign In");
    }
  }
</script>
</body>
</html>
