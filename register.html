<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Register – TalentTrack</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
</head>
<body>
<div id="toast-container"></div>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-brand">TalentTrack</a>
    <div class="nav-links">
      <button class="theme-btn" onclick="toggleTheme()">🌙</button>
      <a href="login.html" class="nav-btn ghost">Login</a>
      <a href="admin.html" class="nav-btn primary">Admin</a>
    </div>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo"><span class="brand-logo">TalentTrack</span></div>
    <h2>Create Account</h2>
    <p class="auth-sub">Join thousands of job seekers today</p>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="reg-name" placeholder="John Doe"/>
      <div class="form-error" id="err-name"></div>
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="reg-email" placeholder="you@example.com"/>
      <div class="form-error" id="err-email"></div>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="reg-pass" placeholder="Min. 6 characters"
             onkeydown="if(event.key==='Enter') doRegister()"/>
      <div class="form-error" id="err-pass"></div>
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="reg-cpass" placeholder="Repeat password"
             onkeydown="if(event.key==='Enter') doRegister()"/>
      <div class="form-error" id="err-cpass"></div>
    </div>
    <div class="form-error" id="err-general"></div>

    <button class="auth-submit" id="reg-btn" onclick="doRegister()">
      <span id="reg-btn-text">Create Account</span>
      <span id="reg-spinner" class="spinner" style="display:none"></span>
    </button>

    <div class="auth-link">
      Already have an account? <a href="login.html">Sign In</a> ·
      <a href="index.html">Home</a>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script>
  if (localStorage.getItem("tt_token") && localStorage.getItem("tt_role")==="user") {
    window.location.href="dashboard.html";
  }

  async function doRegister() {
    clearErrors();
    const name  = document.getElementById("reg-name").value.trim();
    const email = document.getElementById("reg-email").value.trim();
    const pass  = document.getElementById("reg-pass").value;
    const cpass = document.getElementById("reg-cpass").value;

    let ok = true;
    if (!name)           { showErr("err-name",  "Name is required");        ok=false; }
    if (!email)          { showErr("err-email", "Email is required");       ok=false; }
    if (pass.length < 6) { showErr("err-pass",  "Minimum 6 characters");   ok=false; }
    if (pass !== cpass)  { showErr("err-cpass", "Passwords do not match"); ok=false; }
    if (!ok) return;

    setLoading("reg-btn","reg-btn-text","reg-spinner",true);
    try {
      const res = await apiPost("/api/users/register",{ name, email, password:pass });
      if (res.success) {
        saveAuth(res.token, res.user);
        toast("Account created! Redirecting...","success");
        setTimeout(()=>{ window.location.href="dashboard.html"; },1000);
      } else {
        showErr("err-general", res.message || "Registration failed");
      }
    } catch(err) {
      showErr("err-general","Cannot connect to server. Make sure the backend is running on port 5000.");
    } finally {
      setLoading("reg-btn","reg-btn-text","reg-spinner",false,"Create Account");
    }
  }
</script>
</body>
</html>
